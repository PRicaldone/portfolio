    <style>
        /* Main Container */
        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 2rem;
        }

        /* Contact Layout */
        .contact-content {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1px 2fr;
            gap: 6rem;
            align-items: center;
        }

        /* Left Side - Direct Contact */
        .contact-direct {
            text-align: right;
            opacity: 0;
            animation: fadeInLeft 1.2s ease forwards;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 200;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .contact-link {
            font-size: 1.1rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            position: relative;
        }

        .contact-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--text-primary);
            transition: width 0.3s var(--transition-smooth);
        }

        .contact-link:hover {
            color: var(--text-primary);
        }

        .contact-link:hover::after {
            width: 100%;
        }

        /* Vertical Separator */
        .separator {
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom,
                transparent,
                var(--text-tertiary) 20%,
                var(--text-tertiary) 80%,
                transparent);
            opacity: 0.2;
        }

        /* Right Side - Links */
        .contact-sections {
            display: grid;
            gap: 3rem;
            opacity: 0;
            animation: fadeInRight 1.2s ease 0.3s forwards;
        }

        .contact-section {
            position: relative;
            transition: transform 0.5s var(--transition-smooth);
        }

        .contact-section::before {
            content: '';
            position: absolute;
            left: -2rem;
            top: 0;
            width: 2px;
            height: 0;
            background: var(--text-tertiary);
            opacity: 0.3;
            transition: height 0.6s var(--transition-smooth);
        }

        .contact-section:hover::before {
            height: 100%;
        }

        .contact-section:hover {
            transform: translateX(10px);
        }

        .section-subtitle {
            font-size: 1.25rem;
            font-weight: 300;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .section-description {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        /* Social Links */
        .social-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .social-link {
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-link svg {
            width: 22px;
            height: 22px;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            color: var(--text-primary);
        }

        .social-link:hover svg {
            transform: translateY(-2px);
        }

        /* Newsletter Form */
        .newsletter-form {
            display: flex;
            gap: 1rem;
            position: relative;
        }

        .newsletter-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--text-tertiary);
            padding: 0.75rem 0;
            font-size: 1rem;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .newsletter-input::placeholder {
            color: var(--text-tertiary);
            font-style: italic;
        }

        .newsletter-input:focus {
            outline: none;
            border-bottom-color: var(--text-secondary);
        }

        .newsletter-submit {
            background: transparent;
            border: 1px solid var(--text-tertiary);
            padding: 0.75rem 2rem;
            font-size: 0.875rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .newsletter-submit:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
            background: rgba(255,255,255,0.03);
        }

        [data-theme="light"] .newsletter-submit:hover {
            background: rgba(0,0,0,0.03);
        }

        /* Responsive */
        @media (max-width: 968px) {
            .contact-content {
                grid-template-columns: 1fr;
                gap: 4rem;
            }

            .contact-direct {
                text-align: center;
            }

            .separator {
                display: none;
            }

            .contact-section::before {
                display: none;
            }

            .contact-section:hover {
                transform: none;
            }
        }

        @media (max-width: 768px) {
            .section-title {
                font-size: 2rem;
            }

            .social-links {
                flex-wrap: wrap;
                gap: 1.25rem;
            }

            .newsletter-form {
                flex-direction: column;
            }

            .newsletter-submit {
                width: 100%;
            }
        }
    </style>
</head>
